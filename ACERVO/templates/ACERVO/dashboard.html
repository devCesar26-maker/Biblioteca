{% extends "ACERVO/base.html" %}
{% block content %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --radius: 12px;
        --background: #f4efe6;
        --foreground: #112216;
        --card: #ffffff;
        --primary: #053e2f;
        --primary-foreground: #faf8f5;
        --muted-foreground: #526356;
        --accent: #bd963a;
        --border: #dad3c5;
        --shadow-sm: 0 4px 10px rgba(17,34,22,.03);
    }

    .dashboard-wrapper {
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        background-color: var(--background);
        min-height: 100vh;
        color: var(--foreground);
    }

    .page-header {
        padding: 3rem 0 2rem 0;
        border-bottom: 1px solid rgba(5, 62, 47, 0.1);
    }

    .font-serif {
        font-family: "Libre Baskerville", Georgia, serif;
        color: var(--primary);
    }

    .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        padding: 1.75rem;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(17,34,22,.05);
    }

    .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.35rem;
        border: 1px solid rgba(5, 62, 47, 0.08);
    }

    .icon-books {
        background-color: rgba(5, 62, 47, 0.04);
        color: var(--primary);
    }

    .icon-loans {
        background-color: rgba(189, 150, 58, 0.06);
        color: var(--accent);
        border-color: rgba(189, 150, 58, 0.15);
    }

    .stat-title {
        color: var(--muted-foreground);
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    .stat-value {
        color: var(--primary);
        font-family: "Libre Baskerville", serif;
        font-size: 2rem;
        font-weight: 700;
    }

    .chart-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        padding: 2.5rem;
        margin-top: 1.5rem;
    }

    .chart-title {
        font-family: "Libre Baskerville", serif;
        color: var(--primary);
        font-weight: 700;
    }

    .chart-container {
        position: relative;
        width: 100%;
        max-height: 380px; 
    }
</style>

<div class="dashboard-wrapper">
    <div class="container pb-5">
        
        <div class="page-header mb-4">
            <h2 class="font-serif fw-bold mb-1 h3">Painel de Estatísticas</h2>
            <p class="text-muted small mb-0">Métricas gerais e monitoramento de circulação do acervo patrimonial.</p>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-12 col-sm-6">
                <div class="stat-card d-flex align-items-center gap-3">
                    <div class="stat-icon icon-books flex-shrink-0">
                        <i class="bi bi-bookshelf"></i>
                    </div>
                    <div>
                        <span class="stat-title d-block mb-1">Total de Livros</span>
                        <span class="stat-value d-block">{{ total_livros }}</span>
                    </div>
                </div>
            </div>

            <div class="col-12 col-sm-6">
                <div class="stat-card d-flex align-items-center gap-3">
                    <div class="stat-icon icon-loans flex-shrink-0">
                        <i class="bi bi-arrow-left-right"></i>
                    </div>
                    <div>
                        <span class="stat-title d-block mb-1">Total de Empréstimos</span>
                        <span class="stat-value d-block">{{ total_emprestimos }}</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="chart-card">
            <div class="d-flex align-items-center gap-2 mb-4">
                <i class="bi bi-bar-chart-line text-muted fs-5"></i>
                <h5 class="chart-title mb-0 h6">Popularidade por Categoria</h5>
            </div>
            
            <div class="chart-container">
                <canvas id="graficoCategorias"></canvas>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const ctx = document.getElementById('graficoCategorias');
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [{% for c in emprestimos_por_categoria %}'{{ c.livro__categoria__nome }}',{% endfor %}],
                datasets: [{
                    label: 'Quantidade de Empréstimos',
                    data: [{% for c in emprestimos_por_categoria %}{{ c.total }},{% endfor %}],
                    backgroundColor: '#053e2f', // Verde oliva profundo institucional
                    hoverBackgroundColor: '#bd963a', // Transiciona para o dourado ao passar o mouse
                    borderRadius: 4,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#526356',
                            font: { 
                                family: '"IBM Plex Sans", sans-serif',
                                weight: '500',
                                size: 12
                            }
                        }
                    },
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: '#eaddca' // Linhas discretas combinando com o fundo marfim
                        },
                        ticks: {
                            color: '#526356',
                            stepSize: 1,
                            font: {
                                family: '"IBM Plex Sans", sans-serif'
                            }
                        }
                    }
                }
            }
        });
    });
</script>
{% endblock %}
