{% extends "ACERVO/base.html" %}
{% block content %}
<style>
    body {
        background-color: #f8fafc;
    }

    .page-header {
        padding: 2.5rem 0 1.5rem 0;
    }

    .stat-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        padding: 1.5rem;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.35rem;
    }

    .icon-books {
        background-color: #eff6ff;
        color: #2563eb;
    }

    .icon-loans {
        background-color: #f0fdf4;
        color: #16a34a;
    }

    .stat-title {
        color: #64748b;
        font-size: 0.875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .stat-value {
        color: #0f172a;
        font-size: 1.85rem;
        font-weight: 700;
        line-spacing: -0.02em;
    }

    .chart-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        padding: 2rem;
    }

    .chart-container {
        position: relative;
        width: 100%;
        /* Altura controlada para o gráfico não esticar infinitamente na vertical */
        max-height: 380px; 
    }
</style>

<div class="container pb-5">
    
    <div class="page-header mb-4">
        <h2 class="fw-bold text-dark mb-1 h3">Painel de Estatísticas</h2>
        <p class="text-muted mb-0">Métricas gerais e monitoramento de circulação do acervo.</p>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-12 col-sm-6">
            <div class="stat-card d-flex align-items-center gap-3">
                <div class="stat-icon icon-books flex-shrink-0">
                    <i class="bi bi-bookshelf"></i>
                </div>
                <div>
                    <span class="stat-title d-block mb-1">Total de Livros</span>
                    <span class="stat-value d-block">{{ total_livros }}</span>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6">
            <div class="stat-card d-flex align-items-center gap-3">
                <div class="stat-icon icon-loans flex-shrink-0">
                    <i class="bi bi-arrow-left-right"></i>
                </div>
                <div>
                    <span class="stat-title d-block mb-1">Total de Empréstimos</span>
                    <span class="stat-value d-block">{{ total_emprestimos }}</span>
                </div>
            </div>
        </div>
    </div>

    <div class="chart-card">
        <div class="d-flex align-items-center gap-2 mb-4">
            <i class="bi bi-bar-chart-line text-muted fs-5"></i>
            <h5 class="fw-bold text-dark mb-0 h6">Popularidade por Categoria</h5>
        </div>
        
        <div class="chart-container">
            <canvas id="graficoCategorias"></canvas>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const ctx = document.getElementById('graficoCategorias');
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [{% for c in emprestimos_por_categoria %}'{{ c.livro__categoria__nome }}',{% endfor %}],
                datasets: [{
                    label: 'Quantidade de Empréstimos',
                    data: [{% for c in emprestimos_por_categoria %}{{ c.total }},{% endfor %}],
                    backgroundColor: '#16a34a', // Verde corporativo sólido
                    borderRadius: 6, // Arredonda os cantos das barras do gráfico
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, // Permite respeitar a altura do container CSS
                plugins: {
                    legend: {
                        display: false // Esconde a legenda redundante já que o título do card explica o gráfico
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false // Remove linhas verticais do fundo para limpar o design
                        },
                        ticks: {
                            color: '#64748b',
                            font: { fontStyle: '500' }
                        }
                    },
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: '#f1f5f9' // Deixa as linhas horizontais bem discretas
                        },
                        ticks: {
                            color: '#64748b',
                            stepSize: 1
                        }
                    }
                }
            }
        });
    });
</script>
{% endblock %}
