{% extends "ACERVO/base.html" %}
{% block content %}
<div class="container mt-5 text-center">
    <div class="alert alert-danger shadow-sm" role="alert">
        <h2 class="fw-bold">Licença Expirada</h2>
        <p class="mt-3">
            O prazo de devolução do empréstimo já passou ou o livro foi marcado como devolvido.
        </p>
        <p>
            Para continuar acessando este conteúdo, renove sua licença ou realize um novo empréstimo.
        </p>
        <a href="{% url 'index' %}" class="btn btn-primary mt-3">
            <i class="bi bi-house-door"></i> Voltar à página inicial
        </a>
    </div>
</div>
{% endblock %}
