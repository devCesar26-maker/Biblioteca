{% extends "ACERVO/base.html" %}
{% load django_bootstrap5 %}

{% block content %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --radius: 12px;
        --background: #f4efe6;
        --foreground: #112216;
        --card: #ffffff;
        --primary: #053e2f;
        --primary-foreground: #faf8f5;
        --muted-foreground: #526356;
        --accent: #bd963a;
        --border: #dad3c5;
        --shadow-sm: 0 4px 10px rgba(17,34,22,.03);
    }

    .form-wrapper {
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        background-color: var(--background);
        min-height: 90vh;
        color: var(--foreground);
    }

    .form-container {
        max-width: 520px;
        margin: 0 auto;
        padding-bottom: 5rem;
    }

    .page-header {
        padding: 3rem 0 1.5rem 0;
        border-bottom: 1px solid rgba(5, 62, 47, 0.1);
    }

    .font-serif {
        font-family: "Libre Baskerville", Georgia, serif;
        color: var(--primary);
    }

    .btn-back {
        color: var(--primary);
        background-color: transparent;
        border: 1px solid rgba(5, 62, 47, 0.2);
        font-weight: 600;
        border-radius: 4px;
        font-size: 0.8rem;
        padding: 0.5rem 1rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.2s ease-in-out;
    }

    .btn-back:hover {
        background-color: rgba(5, 62, 47, 0.05);
        color: var(--primary);
    }

    .form-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-sm);
        padding: 2.5rem;
        margin-top: 2rem;
    }

    .form-card input, 
    .form-card textarea, 
    .form-card select {
        display: block;
        width: 100%;
        padding: 0.65rem 0.85rem;
        font-size: 0.95rem;
        color: var(--foreground);
        background-color: #faf8f5;
        border: 1px solid var(--border);
        appearance: none;
        border-radius: 4px;
        transition: all 0.2s ease-in-out;
        margin-top: 0.35rem;
        margin-bottom: 1.5rem;
    }

    .form-card input:focus, 
    .form-card textarea:focus, 
    .form-card select:focus {
        background-color: var(--card);
        border-color: var(--primary);
        outline: 0;
        box-shadow: 0 0 0 3px rgba(5, 62, 47, 0.05);
    }

    .form-card p {
        margin-bottom: 0;
        color: var(--primary);
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }

    .btn-submit-custom {
        background-color: var(--primary);
        border: 1px solid var(--primary);
        color: var(--primary-foreground);
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-radius: 4px;
        padding: 0.75rem 1.2rem;
        transition: all 0.3s cubic-bezier(.25,1,.33,1);
    }

    .btn-submit-custom:hover {
        background-color: transparent;
        color: var(--primary);
    }

    .alert-custom {
        background-color: #fdf2f2;
        border: 1px solid #f5c6cb;
        color: #721c24;
        border-radius: 4px;
        font-size: 0.85rem;
    }
</style>

<div class="form-wrapper">
    <div class="container">
        <div class="form-container">
            
            <div class="page-header d-flex justify-content-between align-items-center mb-2">
                <div>
                    <h2 class="font-serif fw-bold mb-0 h4">Editar Autor</h2>
                    <p class="text-muted small mb-0">Modifique os dados do cadastro selecionado.</p>
                </div>
                <a href="{% url 'autores' %}" class="btn btn-back d-inline-flex align-items-center gap-2">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>

            <div class="form-card">
                {% if form.errors %}
                    <div class="alert alert-custom p-3 mb-4 d-flex align-items-center gap-2" role="alert">
                        <i class="bi bi-exclamation-circle-fill"></i>
                        <div><strong>Aviso:</strong> Por favor, verifique as informações preenchidas.</div>
                    </div>
                {% endif %}

                <form action="{% url 'edit_autor' autor.id %}" method="post">
                    {% csrf_token %}

                    <div class="form-fields-wrapper">
                        {{ form.as_p }}
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-submit-custom w-100 d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-journal-check"></i> Salvar Alterações
                        </button>
                    </div>
                </form>
            </div>
            
        </div>
    </div>
</div>
{% endblock content %}
