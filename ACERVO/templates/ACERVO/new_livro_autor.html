{% extends "ACERVO/base.html" %}
{% load bootstrap5 %}

{% block content %}
<style>
    body {
        background-color: #f8fafc;
    }

    .form-container {
        max-width: 520px;
        margin: 0 auto;
        padding-bottom: 5rem;
    }

    .page-header {
        padding: 2.5rem 0 1.5rem 0;
    }

    .btn-back {
        color: #64748b;
        background-color: #ffffff;
        border: 1px solid #cbd5e1;
        font-weight: 500;
        border-radius: 6px;
        font-size: 0.9rem;
        padding: 0.4rem 0.85rem;
        transition: all 0.2s;
    }

    .btn-back:hover {
        background-color: #f8fafc;
        border-color: #94a3b8;
        color: #1e293b;
    }

    .form-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        padding: 2rem;
    }

    /* Estilização refinada para os inputs e selects injetados pelo Django */
    .form-card input, 
    .form-card textarea, 
    .form-card select {
        display: block;
        width: 100%;
        padding: 0.475rem 2.25rem 0.475rem 0.75rem;
        font-size: 0.95rem;
        font-weight: 400;
        line-height: 1.5;
        color: #334155;
        background-color: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        margin-top: 0.25rem;
        margin-bottom: 1.25rem;
    }

    /* Customização específica para o comportamento de dropdowns nativos */
    .form-card select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 0.75rem center;
        background-size: 16px 12px;
        appearance: none;
    }

    .form-card input:focus, 
    .form-card textarea:focus, 
    .form-card select:focus {
        color: #0f172a;
        background-color: #ffffff;
        border-color: #4f46e5;
        outline: 0;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    /* Formatação para as labels nativas do form.as_p */
    .form-card p {
        margin-bottom: 0;
        color: #475569;
        font-weight: 500;
        font-size: 0.9rem;
    }

    .btn-submit-custom {
        background-color: #4f46e5;
        border-color: #4f46e5;
        color: #ffffff;
        font-weight: 500;
        border-radius: 6px;
        padding: 0.6rem 1rem;
        transition: all 0.2s;
    }

    .btn-submit-custom:hover {
        background-color: #4338ca;
        border-color: #4338ca;
        color: #ffffff;
    }

    .alert-custom {
        background-color: #fef2f2;
        border: 1px solid #fca5a5;
        color: #991b1b;
        border-radius: 8px;
        font-size: 0.9rem;
    }
</style>

<div class="container">
    <div class="form-container">
        
        <div class="page-header d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-0 h4">Vincular Autor</h2>
                <p class="text-muted small mb-0">Associe autores específicos aos livros do catálogo.</p>
            </div>
            <a href="{% url 'livros' %}" class="btn btn-back d-inline-flex align-items-center gap-2">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <div class="form-card">
            {% if form.errors %}
                <div class="alert alert-custom p-3 mb-4 d-flex align-items-center gap-2" role="alert">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <div><strong>Erro:</strong> Por favor, verifique os campos selecionados.</div>
                </div>
            {% endif %}

            <form action="{% url 'new_livro_autor' %}" method="post">
                {% csrf_token %}

                <div class="form-fields-wrapper">
                    {{ form.as_p }}
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-submit-custom w-100 d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-link-45deg"></i> Salvar Vínculo
                    </button>
                </div>
            </form>
        </div>
        
    </div>
</div>
{% endblock content %}
