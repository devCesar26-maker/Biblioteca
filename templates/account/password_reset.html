{% block content %}
<div style="max-width: 450px; margin: 60px auto; padding: 30px; background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-family: Arial, sans-serif;">
    <h2 style="color: #2C3E50; margin-top: 0; text-align: center;">Recuperar Senha</h2>
    <p style="color: #7f8c8d; text-align: center; font-size: 14px; margin-bottom: 25px;">
        Digite seu e-mail cadastrado abaixo para receber um link de redefinição.
    </p>

    <form method="POST" action="{% url 'account_reset_password' %}">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label for="id_email" style="display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; font-size: 14px;">E-mail:</label>
            <input type="email" name="email" id="id_email" placeholder="seu-email@exemplo.com" required 
                   style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px;">
        </div>

        <button type="submit" style="width: 100%; background: #2C3E50; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer;">
            Enviar Link de Recuperação
        </button>
    </form>
    
    <div style="margin-top: 20px; text-align: center;">
        <a href="{% url 'account_login' %}" style="color: #3498db; text-decoration: none; font-size: 14px;">Voltar para o Login</a>
    </div>
</div>
{% endblock %}
