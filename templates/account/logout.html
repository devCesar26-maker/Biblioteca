{% extends "ACERVO/base.html" %}
{% load bootstrap5 %}
{% load socialaccount %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="card shadow-lg border-0 p-4 text-center" style="max-width: 420px; width: 100%;">
        
        <!-- Cabeçalho -->
        <div class="card-header bg-danger text-white">
            <h3 class="fw-bold mb-0">Sair da Conta</h3>
        </div>

        <!-- Corpo -->
        <div class="card-body">
            <p class="mb-4">Tem certeza que deseja sair?</p>
            <form method="post" action="{% url 'account_logout' %}">
                {% csrf_token %}
                <div class="d-grid">
                    <button type="submit" class="btn btn-danger btn-lg">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </form>
        </div>

        <!-- Rodapé -->
        <div class="card-footer bg-light">
            <small class="text-muted">
                Deseja entrar novamente?
                <a href="{% url 'account_login' %}" class="fw-bold text-decoration-none">Clique aqui</a>
            </small>
        </div>
    </div>
</div>
{% endblock %}
