{% block content %}
<div style="max-width: 450px; margin: 60px auto; padding: 30px; background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-family: Arial, sans-serif; text-align: center;">
    <div style="font-size: 50px; color: #2ecc71; margin-bottom: 15px;"></div>
    <h2 style="color: #2C3E50; margin-top: 0;">Senha Alterada!</h2>
    
    <p style="color: #34495e; font-size: 15px; line-height: 1.6; margin-bottom: 25px;">
        Sua senha foi redefinida com sucesso. Você já pode acessar a plataforma utilizando suas novas credenciais de acesso.
    </p>

    <a href="{% url 'account_login' %}" style="display: inline-block; width: 100%; background: #2C3E50; color: white; padding: 12px; border-radius: 4px; font-size: 16px; font-weight: bold; text-decoration: none; box-sizing: border-box;">
        Fazer Login Agora
    </a>
</div>
{% endblock %}
